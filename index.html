<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Kamu ❤️</title>
    <style>
        :root {
            --romance-pink: #ffdde1;
            --main-red: #ff4757;
            --text-dark: #333;
            --text-light: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0b0d17;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            transition: background 1s ease;
        }

        .page { display: none; width: 90%; max-width: 450px; padding: 20px; opacity: 0; transform: translateY(20px); transition: opacity 1s, transform 1s; }
        .page.active { display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 1; transform: translateY(0); }

        button { padding: 12px 28px; cursor: pointer; border: none; border-radius: 25px; background: var(--main-red); color: var(--text-light); font-weight: bold; font-size: 16px; margin-top: 30px; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); transition: all 0.3s; }
        button:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6); }

        /* Layer 1 & 2 */
        #layer1 h1 { font-size: 32px; animation: glow 2s infinite alternate; }
        .body-pink { background: var(--romance-pink); color: var(--text-dark); }
        #typing-text { font-size: 19px; line-height: 1.6; font-style: italic; min-height: 100px; }

        /* Layer 3 */
        .photo-frame { position: relative; margin-bottom: 25px; animation: zoomIn 1.5s ease-out; }
        .photo { width: 180px; height: 180px; border-radius: 50%; border: 8px solid #fff; object-fit: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .pujian-line { font-size: 17px; margin-bottom: 8px; opacity: 0; animation: fadeIn 0.5s forwards; }

        /* Bunga Mawar Baru */
        .flower-scene { position: relative; width: 150px; height: 250px; margin: 20px auto; display: flex; justify-content: center; }
        .stem { position: absolute; bottom: 0; width: 6px; height: 180px; background: #2d6a4f; border-radius: 5px; }
        .flower-bloom { position: absolute; top: 20px; width: 100px; height: 100px; animation: bloom 2s ease-out forwards; }
        .petal { position: absolute; background: #e63946; border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .petal.p1 { width: 50px; height: 70px; left: 25px; top: 0; background: #d00000; }
        .petal.p2 { width: 50px; height: 70px; left: 0; top: 10px; transform: rotate(-20deg); }
        .petal.p3 { width: 50px; height: 70px; left: 50px; top: 10px; transform: rotate(20deg); }
        .petal.p4 { width: 60px; height: 60px; left: 20px; top: 20px; border-radius: 50%; background: #9d0208; }

        /* Animasi */
        @keyframes glow { 0% { opacity: 0.7; } 100% { opacity: 1; text-shadow: 0 0 15px #fff, 0 0 20px #ff4757; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes bloom { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body id="body">

    <div id="layer1" class="page active">
        <h1>Halo Bebeee ❤️</h1><br><h3>aku punya sesuatu buat bebe</h3>
        <button onclick="showLayer(2)">Klik untuk membuka suratku...</button>
    </div>

    <div id="layer2" class="page">
        <p id="typing-text"></p>
        <button onclick="showLayer(3)">Lanjut ❤️</button>
    </div>

    <div id="layer3" class="page">
        <div class="photo-frame"><img src="ayang.jpeg" class="photo" alt="Kamu ❤️"></div>
        <div id="compliments"></div>
        <button onclick="showLayer(4)">Masih ada hadiah...</button>
    </div>

    <div id="layer4" class="page">
        <div class="flower-scene">
            <div class="stem"></div>
            <div class="flower-bloom">
                <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div>
            </div>
        </div>
        <p>Bebe aku ada setangkai bunga untuk kamu sayang</p>
        <p style="font-weight:bold; margin-top:10px;">(huhuh maaf bunganya oon. aku masih belajar buatnya).</p>
        <h1 style="color:var(--main-red); margin-top:10px;">Wofyuu sayanggkuu Jeanne. ❤️</h1>
    </div>

    <script>
        const body = document.getElementById('body');
        function showLayer(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            body.classList.toggle('body-pink', n === 2);
            document.getElementById('layer' + n).classList.add('active');
            if(n === 2) startTyping();
            if(n === 3) showCompliments();
        }

        function startTyping() {
            const text = "Bebe sayang maaf ya kmu kesel sma dede karna aku kesannya marahin kmu. maaf jga ya karna aku malah becandain perasaanmu.bebe ayo kita baikan ya sayang?. aku ga bakal nyebelin lagi huhuh";
            let i = 0;
            const el = document.getElementById("typing-text");
            el.innerHTML = "";
            function type() { if(i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 50); } }
            type();
        }

        function showCompliments() {
            const lines = ["Sayang coba liat muka kmu dsini.", "Kamu tuh cantik banget sayang.", "aku kangen buat liat wajahmu yang cantik ini.", "Tpi karna marahan aku ga kebagian kecantikan itu huhu.", "jadi sayangku, ayo baikan yah??."];
            const container = document.getElementById('compliments');
            container.innerHTML = "";
            lines.forEach((line, idx) => {
                setTimeout(() => {
                    const p = document.createElement('p');
                    p.className = 'pujian-line';
                    p.innerText = line;
                    container.appendChild(p);
                }, idx * 1200);
            });
        }
    </script>
</body>
</html>
