<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Sayang ❤️</title>
    <style>
        /* CSS: Sentuhan Estetik */
        :root {
            --romance-pink: #ffdde1;
            --main-red: #ff4757;
            --text-dark: #333;
            --text-light: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0b0d17;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            transition: background 1s ease;
        }

        .page { display: none; width: 90%; max-width: 450px; padding: 20px; opacity: 0; transform: translateY(20px); transition: opacity 1s, transform 1s; }
        .page.active { display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 1; transform: translateY(0); }

        button { padding: 12px 28px; cursor: pointer; border: none; border-radius: 25px; background: var(--main-red); color: var(--text-light); font-weight: bold; font-size: 16px; margin-top: 30px; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); transition: all 0.3s; }
        button:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6); }

        #layer1 h1 { font-size: 32px; animation: glow 2s infinite alternate; }
        .body-pink { background: var(--romance-pink); color: var(--text-dark); }
        #typing-text { font-size: 19px; line-height: 1.6; font-style: italic; min-height: 100px; }

        .photo-frame { position: relative; margin-bottom: 25px; animation: zoomIn 1.5s ease-out; }
        .photo { width: 180px; height: 180px; border-radius: 50%; border: 8px solid #fff; object-fit: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        #compliments { margin-top: 15px; min-height: 80px; }
        .pujian-line { font-size: 17px; margin-bottom: 8px; opacity: 0; animation: fadeIn 0.5s forwards; }

        /* Bunga Estetik */
        .flower-scene { position: relative; width: 200px; height: 250px; margin-bottom: 20px; animation: growFlowerScene 2s ease-out; }
        .stem { position: absolute; bottom: 0; left: 50%; width: 8px; height: 180px; background: #2d6a4f; transform: translateX(-50%); border-radius: 5px; animation: stemGrow 1s ease-out forwards; }
        .flower-bloom { position: absolute; top: 10px; left: 50%; transform: translateX(-50%) scale(0); animation: flowerBloom 1.5s 1s ease-out forwards; }
        .petal { position: absolute; background: var(--main-red); border-radius: 50% 50% 10% 10%; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .petal.p1 { width: 60px; height: 60px; top: -30px; left: -30px; z-index: 5; background: #b91c1c; }
        .petal.p2 { width: 55px; height: 55px; top: -28px; left: -28px; z-index: 4; transform: rotate(45deg); }
        .petal.p3 { width: 50px; height: 50px; top: -25px; left: -25px; z-index: 3; transform: rotate(90deg); }
        .petal.p4 { width: 45px; height: 45px; top: -22px; left: -22px; z-index: 2; transform: rotate(135deg); }
        .petal.p5 { width: 80px; height: 30px; top: 10px; left: -40px; z-index: 1; border-radius: 50%; }

        @keyframes glow { 0% { opacity: 0.7; } 100% { opacity: 1; text-shadow: 0 0 15px #fff, 0 0 20px #ff4757; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes growFlowerScene { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes stemGrow { from { height: 0; } to { height: 180px; } }
        @keyframes flowerBloom { to { transform: translateX(-50%) scale(1); } }
    </style>
</head>
<body id="body">

    <div id="layer1" class="page active">
        <h1>Hai Sayang ❤️</h1>
        <button onclick="showLayer(2)">Klik untuk membuka suratku...</button>
    </div>

    <div id="layer2" class="page">
        <p id="typing-text"></p>
        <button onclick="showLayer(3)">Lanjut ❤️</button>
    </div>

    <div id="layer3" class="page">
        <div class="photo-frame"><img src="ayang.jpg" class="photo" alt="Kamu ❤️"></div>
        <div id="compliments"></div>
        <button onclick="showLayer(4)">Masih ada hadiah...</button>
    </div>

    <div id="layer4" class="page">
        <div class="flower-scene">
            <div class="stem"></div>
            <div class="flower-bloom">
                <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div>
            </div>
        </div>
        <p>Bunga ini mungkin akan layu suatu hari nanti...</p>
        <p style="color:var(--main-red); font-weight:bold; margin:10px 0;">Tapi rasa sayangku kepadamu tidak akan pernah layu.</p>
        <h1>Aku Sayang Kamu ❤️</h1>
    </div>

    <script>
        const body = document.getElementById('body');
        function showLayer(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            body.classList.toggle('body-pink', n === 2);
            document.getElementById('layer' + n).classList.add('active');
            if(n === 2) startTyping();
            if(n === 3) showCompliments();
        }

        function startTyping() {
            const text = "Aku tahu akhir-akhir ini aku membuatmu kesal. Aku minta maaf atas semua perkataan dan sikapku. Aku tidak bermaksud menyakitimu. Kalau boleh mengulang waktu, aku pasti akan memilih untuk tidak membuatmu sedih.";
            let i = 0;
            const el = document.getElementById("typing-text");
            el.innerHTML = "";
            function type() { if(i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 50); } }
            type();
        }

        function showCompliments() {
            const lines = ["Aku selalu bersyukur dipertemukan denganmu.", "Senyummu berhasil membuat hariku lebih indah.", "Matamu selalu menjadi tempat ternyaman.", "Terima kasih sudah bertahan sejauh ini.", "Buatku, kamu adalah perempuan paling cantik."];
            const container = document.getElementById('compliments');
            container.innerHTML = "";
            lines.forEach((line, idx) => {
                setTimeout(() => {
                    const p = document.createElement('p');
                    p.className = 'pujian-line';
                    p.innerText = line;
                    container.appendChild(p);
                }, idx * 1200);
            });
        }
    </script>
</body>
</html>
